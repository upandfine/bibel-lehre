name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Sliplane braucht keine GitHub-Actions, deploy passiert per Webhook bei push.
# Diese Pipeline ist rein für Qualitäts-Gates: typecheck + tests vor jedem
# Push auf main werden im PR sichtbar.

jobs:
  test:
    name: Typecheck + Unit-Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit-Tests
        run: pnpm test

